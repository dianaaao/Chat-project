<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="{{url_for('static', filename = 'css/style.css')}}">
    {% block links %}{% endblock %}
</head>
<body>
    <header>
        {% if registration %}
            <div class="header">
                <img src="{{ url_for('static', filename = 'images/logo.svg') }}" alt="">
                <button class="log-in" type="button"><a href="login">Увійти</a></button>
            </div>
        {% elif login and not current_user.is_authenticated %}
            <div class="header">
                <img src="{{ url_for('static', filename='images/logo.svg') }}" alt="">
                <button class="register" type="button"><a href="/">Створити обліковий запис</a></button>
            </div>
        {% elif current_user.is_authenticated %}
            <div class="header">
                <button class="register" type="button"><a href="{{ url_for('main_page.logout') }}">Вихід</a></button>
            </div>
        {% endif %}
    </header>
    
    <main>
        {% block content %}{% endblock %}
    </main>

    <footer>
        {% if registration %}
            <div class="footer">
                <img src="{{ url_for('static', filename = 'images/image.svg') }}" alt="">
            </div>
        {% elif login %}
            <div class="footer">
                <img src="{{ url_for('static', filename = 'images/image.svg') }}" alt="">
            </div>
        {% endif %}
    </footer>
</body>
</html>
